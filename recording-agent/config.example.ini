; CallIQ recording uploader — configuration
; Copy this file to "config.ini" (same folder) and fill it in.
; Any value can also be set as an environment variable, e.g. CALLIQ_API_KEY, which wins.

[uploader]
; The CallIQ ingestion endpoint. Leave as-is for production.
api_url = https://repiq.co.uk/api/recordings/upload

; MUST match RECORDINGS_API_KEY set on the server (Railway). Keep it secret.
api_key = PASTE_THE_SAME_KEY_AS_RAILWAY

; The rep this machine records for (their CallIQ login email).
; Leave blank only if you use rep_from_subfolder or the rep@email__file naming.
rep_email = rep@oxfordandbucks.com

; Folder the recorder saves call audio into.
watch_dir = C:\CallIQ\recordings

; Successful uploads are moved into this subfolder of watch_dir so they aren't re-sent.
processed_subdir = processed

; The recorder writes extensionless WAV files (named calliq_YYYY-MM-DD_HH-MM-SS). The agent
; auto-detects the real format from the file's contents; this is the fallback if it can't.
default_ext = wav

; How often (seconds) to scan the folder.
poll_seconds = 10

; A file must stop changing size for this long before it's uploaded (so half-written
; recordings are never sent). Raise it if large files are still recording on upload.
stable_seconds = 15

; Shared/multi-rep machine? Set this to true and put files in per-rep subfolders named
; by email, e.g.  C:\CallIQ\recordings\rep@oxfordandbucks.com\calliq_....
rep_from_subfolder = false

; Transient (network / server 5xx) retries before a file is moved to failed\.
max_attempts = 5

; Upload timeout per file (seconds). Raise for very long recordings on slow links.
timeout_seconds = 300

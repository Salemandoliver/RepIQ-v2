services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calliq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calliq-dev-password}
      POSTGRES_DB: calliq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calliq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://calliq:${POSTGRES_PASSWORD:-calliq-dev-password}@db:5432/calliq
      AUDIO_DIR: /data/audio
    volumes:
      - audio:/data/audio
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://calliq:${POSTGRES_PASSWORD:-calliq-dev-password}@db:5432/calliq
      AUDIO_DIR: /data/audio
    volumes:
      - audio:/data/audio
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.pipeline.worker
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  audio:
